name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-freeglut
            zip

      - name: Show build tools
        shell: msys2 {0}
        run: |
          set -eux
          g++ --version
          ls -la /mingw64/include/GL
          ls -la /mingw64/lib/*glut*
          ls -la /mingw64/bin/*glut*

      - name: Build bird_scene.exe
        shell: msys2 {0}
        run: |
          set -eux
          g++ -std=c++17 -Wall -Wno-deprecated -I/mingw64/include main.cpp OBJImporter.cpp -o bird_scene.exe -L/mingw64/lib -lfreeglut -lopengl32 -lglu32
          ls -la bird_scene.exe

      - name: Prepare submission files
        shell: msys2 {0}
        run: |
          set -eux
          mkdir -p studentNo_yourName_projects/models
          cp bird_scene.exe studentNo_yourName_projects/
          if [ -f /mingw64/bin/freeglut.dll ]; then
            cp /mingw64/bin/freeglut.dll studentNo_yourName_projects/
          elif [ -f /mingw64/bin/libfreeglut.dll ]; then
            cp /mingw64/bin/libfreeglut.dll studentNo_yourName_projects/freeglut.dll
          else
            echo "Could not find the FreeGLUT runtime DLL"
            ls -la /mingw64/bin/*glut* || true
            exit 1
          fi
          cp models/bird.obj studentNo_yourName_projects/models/
          cp README.md studentNo_yourName_projects/README_project.md
          cp WINDOWS_RUN_ME.txt studentNo_yourName_projects/
          cp build_windows.bat studentNo_yourName_projects/
          cp ./*.mp4 studentNo_yourName_projects/ 2>/dev/null || true
          cp ./*.mov studentNo_yourName_projects/ 2>/dev/null || true
          zip -r studentNo_yourName_projects.zip studentNo_yourName_projects

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-bird-scene-package
          path: studentNo_yourName_projects.zip
